# Cloud Build CI/CD pipeline for TaskFlow Planner
# Triggers on push to the main branch.
#
# Required Cloud Build SA permissions:
#   roles/run.admin            — deploy Cloud Run services
#   roles/iam.serviceAccountUser — act as Cloud Run SA
#   roles/secretmanager.secretAccessor — read secrets
#   roles/storage.objectAdmin  — upload to GCS
#   roles/artifactregistry.writer — push Docker images
#
# Secret Manager secrets needed (create with setup-gcp.sh):
#   jwt-secret      — random base64 string (openssl rand -base64 64)
#   database-url    — Cloud SQL connection string
#   cors-origin     — frontend URL
#   vite-api-url    — Cloud Run backend URL (for frontend build)
#
# Substitution variables (set in Cloud Build trigger UI or --substitutions flag):
substitutions:
  _REGION: us-central1
  _ARTIFACT_REGISTRY: taskflow-images
  _CLOUD_RUN_SERVICE: taskflow-api
  _GCS_BUCKET: gs://taskflow-frontend
  _CLOUD_SQL_INSTANCE: taskflow-db   # Cloud SQL instance name (not full path)

steps:
  # ── Backend ────────────────────────────────────────────────────────────────

  # 1. Build backend Docker image from project root context
  - name: 'gcr.io/cloud-builders/docker'
    id: build-backend
    args:
      - build
      - -f
      - server/Dockerfile
      - -t
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REGISTRY}/api:$COMMIT_SHA'
      - -t
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REGISTRY}/api:latest'
      - '.'

  # 2. Push both tags to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: push-backend
    waitFor: [build-backend]
    args:
      - push
      - --all-tags
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REGISTRY}/api'

  # 3. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy-backend
    waitFor: [push-backend]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - '${_CLOUD_RUN_SERVICE}'
      - --image=$_REGION-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REGISTRY}/api:$COMMIT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --set-secrets=JWT_SECRET=jwt-secret:latest,DATABASE_URL=database-url:latest,CORS_ORIGIN=cors-origin:latest
      - --add-cloudsql-instances=$PROJECT_ID:${_REGION}:${_CLOUD_SQL_INSTANCE}
      - --min-instances=0
      - --max-instances=5
      - --memory=512Mi
      - --cpu=1

  # ── Frontend ───────────────────────────────────────────────────────────────

  # 4. Install frontend dependencies (runs in parallel with backend build)
  - name: 'node:20-alpine'
    id: install-frontend
    waitFor: ['-']   # start immediately, don't wait for backend
    entrypoint: npm
    args: [ci]

  # 5. Build frontend — inject Cloud Run URL from Secret Manager
  - name: 'node:20-alpine'
    id: build-frontend
    waitFor: [install-frontend, deploy-backend]   # needs the live API URL
    entrypoint: sh
    secretEnv: [VITE_API_URL]
    args:
      - -c
      - npm run build

  # 6. Sync dist/ to GCS bucket
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy-frontend
    waitFor: [build-frontend]
    entrypoint: gsutil
    args:
      - -m
      - rsync
      - -r
      - -d
      - dist/
      - '${_GCS_BUCKET}'

  # 7. Cache headers — assets are hashed so they can be cached 1 year;
  #    index.html must never be cached so browsers always fetch the latest.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: set-cache-headers
    waitFor: [deploy-frontend]
    entrypoint: sh
    args:
      - -c
      - |
        gsutil -m setmeta \
          -h "Cache-Control:public, max-age=31536000, immutable" \
          "${_GCS_BUCKET}/assets/**" 2>/dev/null || true
        gsutil setmeta \
          -h "Cache-Control:no-cache, no-store, must-revalidate" \
          "${_GCS_BUCKET}/index.html"

# Inject VITE_API_URL from Secret Manager into the frontend build step
availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/vite-api-url/versions/latest
      env: VITE_API_URL

# Images pushed to Artifact Registry (shown in build summary)
images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REGISTRY}/api:$COMMIT_SHA'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REGISTRY}/api:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
